      - SPRING_DATASOURCE_PASSWORD=user
    networks:
      - car-network

  car-charger-management-db:
    image: postgres:16.1
    container_name: postgres-car-charger-management
    ports:
      - "6544:5432"
    environment:
      - POSTGRES_PASSWORD=user
      - POSTGRES_USER=user
      - POSTGRES_DB=car-charger-management
    healthcheck:
      test: pg_isready -q -d $$POSTGRES_DB -U $$POSTGRES_USER
      timeout: 5s
      interval: 5s
      retries: 10
    networks:
      - car-network

  car-booking:
    build: car-booking
    image: car-booking
    container_name: car-booking
