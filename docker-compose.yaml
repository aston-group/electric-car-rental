        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://car-booking-db:5432/car-booking
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=user
    networks:
      - car-network

  car-booking-db:
    image: postgres:16.1
