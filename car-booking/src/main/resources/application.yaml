car-management.url: http://api-gateway:8080/cars
user-management.url: http://api-gateway:8080/users
notifications.url: http://api-gateway:8080/notifications


server:
  port: 8086

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:6545/car-booking
    username: user
    password: user
  application:
    name: car-booking

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: true
    show-sql: true

  sql:
    init:
      mode: always

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
      #defaultZone: http://localhost:8080/
  instance:
    preferIpAddress: true

logging:
  level:
    org.springframework.orm.jpa: INFO
    org.springframework.transaction: INFO
    org.springframework.web: INFO