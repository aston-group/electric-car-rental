    ports:
      - "6543:5432"
    environment:
      - POSTGRES_PASSWORD=user
      - POSTGRES_USER=user
      - POSTGRES_DB=car-management
    healthcheck:
      test: pg_isready -q -d $$POSTGRES_DB -U $$POSTGRES_USER
      timeout: 5s
      interval: 5s
      retries: 10
    networks:
      - car-network

  car-charger-management:
    build: car-charger-management
    image: car-charger-management
    container_name: car-charger-management
    ports:
      - "8084:8084"
    depends_on:
      api-gateway:
        condition: service_started
      discovery-server:
        condition: service_started
